name: Bug report
description: Something isn't working as expected
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! **This issue will be public**, so please keep
        confidential information out of it. In particular, avoid sharing:

        - Your **GitHub token** or any other secret or credential.
        - **Private org or repository names.**
        - **Pull request titles, descriptions, or branch names** — these often
          carry product code names, customer names, or other internal details.
        - **Colleagues' usernames or `@mentions`** (they get pinged, and it can
          reveal who's involved).
        - **Full URLs, console output, or network traces**, which can embed any
          of the above (and even API responses).
        - **Screenshots that show your PR list or other browser tabs** — crop or
          redact them first.

        Describe the problem in general terms wherever a real name isn't needed
        to reproduce it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '…'
        2. Click '…'
        3. See '…'
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: >-
        Which kind of view were you on? Issues are public — please pick the
        kind rather than typing a private org or repository name, which you may
        not want to disclose here. Only share a name if the repo is public and
        naming it is necessary to reproduce.
      options:
        - Everything accessible to me
        - A specific org
        - A single repo
  - type: input
    id: environment
    attributes:
      label: Browser & OS
      placeholder: e.g. Chrome 126 on macOS 15
  - type: input
    id: token-type
    attributes:
      label: Token type
      description: >-
        Fine-grained or classic, and which permissions were granted? No token
        values, and no need to name the owner/resource-owner account.
  - type: textarea
    id: console
    attributes:
      label: Console errors
      description: Any errors in the browser dev-tools console (redact anything sensitive).
      render: shell
