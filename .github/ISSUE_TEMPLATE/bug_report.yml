name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! **This issue will be public.** Please don't
        include your GitHub token or any secrets, and avoid pasting private org
        or repository names unless naming them is necessary to reproduce.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '…'
        2. Click '…'
        3. See '…'
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: >-
        Which kind of view were you on? Issues are public — please pick the
        kind rather than typing a private org or repository name, which you may
        not want to disclose here. Only share a name if the repo is public and
        naming it is necessary to reproduce.
      options:
        - Everything accessible to me
        - A specific org
        - A single repo
  - type: input
    id: environment
    attributes:
      label: Browser & OS
      placeholder: e.g. Chrome 126 on macOS 15
  - type: input
    id: token-type
    attributes:
      label: Token type
      description: >-
        Fine-grained or classic, and which permissions were granted? No token
        values, and no need to name the owner/resource-owner account.
  - type: textarea
    id: console
    attributes:
      label: Console errors
      description: Any errors in the browser dev-tools console (redact anything sensitive).
      render: shell
