<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="PR Triage">
  <!--
    pr-triage mark: a git commit-graph where each node is a triage-status dot
    carrying its PR row. The spine + nodes read as a branch; the three nodes are
    the buckets (needs attention / waiting / ready) in the app's severity colors;
    each node carries a PR title bar. Collapses to a bold status stack at 16px.
  -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4c5ee0"/>
      <stop offset="1" stop-color="#3a49c2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#tile)"/>
  <line x1="152" y1="126" x2="152" y2="386" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
  <rect x="214" y="141" width="196" height="22" rx="11" fill="#ccd3f1"/>
  <rect x="214" y="245" width="196" height="22" rx="11" fill="#ccd3f1"/>
  <rect x="214" y="349" width="196" height="22" rx="11" fill="#ccd3f1"/>
  <circle cx="152" cy="152" r="30" fill="#ee4d74" stroke="#ffffff" stroke-width="18"/>
  <circle cx="152" cy="256" r="30" fill="#f4a52a" stroke="#ffffff" stroke-width="18"/>
  <circle cx="152" cy="360" r="30" fill="#21a25e" stroke="#ffffff" stroke-width="18"/>
</svg>
