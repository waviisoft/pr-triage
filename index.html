<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Whose move is it? A pull-request dashboard grouped by whose court the ball is in."
    />
    <title>PR Triage</title>

    <!-- Icons. Vite rebases these root-absolute paths under the /pr-triage/ base. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Browser chrome color follows the app's light/dark ground. -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f6fb" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f1117" />

    <!-- Social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PR Triage" />
    <meta property="og:title" content="PR Triage — whose move is it?" />
    <meta
      property="og:description"
      content="Open GitHub pull requests, grouped by whose court the ball is in."
    />
    <meta property="og:url" content="https://waviisoft.github.io/pr-triage/" />
    <meta property="og:image" content="https://waviisoft.github.io/pr-triage/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PR Triage — whose move is it?" />
    <meta
      name="twitter:description"
      content="Open GitHub pull requests, grouped by whose court the ball is in."
    />
    <meta name="twitter:image" content="https://waviisoft.github.io/pr-triage/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
